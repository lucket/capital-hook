  <g text-anchor="middle" fill="#1e1e1e" font-size="15">
    <text x="105" y="110">TradingView</text><text x="105" y="128">Alert</text>
    <text x="365" y="105">Webhook route</text><text x="365" y="123" font-size="13">IP allowlist · resolve · dedup</text>
    <text x="365" y="221">Trade Execution</text><text x="365" y="239" font-size="13">(background task)</text>
    <text x="365" y="331">Monitor loop ~1.12s</text><text x="365" y="349" font-size="13">exit rules (TP/SL/EOD/…)</text>
    <text x="676" y="120" font-size="14">Capital.com WebSocket</text><text x="676" y="138" font-size="13">live prices</text>
    <text x="676" y="228">In-memory state</text><text x="676" y="246" font-size="13">prices · positions</text>
    <text x="676" y="336" font-size="14">Capital.com REST</text><text x="676" y="354" font-size="13">open / close orders</text>
    <text x="676" y="472" font-size="14">SQLite</text><text x="676" y="490" font-size="12">trades · positions · config · mappings</text>
    <text x="105" y="470">Browser</text><text x="105" y="488" font-size="13">(session login)</text>
    <text x="365" y="470">Dashboard · Config</text><text x="365" y="488" font-size="13">Mapping · History</text>
  </g>

