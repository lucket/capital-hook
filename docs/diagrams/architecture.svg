<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 35 800 495" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <marker id="ahb" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1e1e1e"/></marker>
    <marker id="aht" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0e7490"/></marker>
    <marker id="ahg" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#15803d"/></marker>
