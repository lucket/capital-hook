  <rect x="10" y="35" width="800" height="495" fill="#ffffff"/>
  <text x="410" y="55" text-anchor="middle" font-size="22" font-weight="600" fill="#1e1e1e">Capital Hook — Architecture &amp; Data Flow</text>

  <!-- Capital.com external zone -->
